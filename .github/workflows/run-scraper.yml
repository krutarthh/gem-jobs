# Run the Gold Gem Jobs scraper every 15 minutes.
# Persists SQLite DB between runs via cache so only new jobs trigger Discord alerts.

name: Run scraper every 15 min

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Needed to push updated DB to a state branch
permissions:
  contents: write

# Prevent overlapping runs: only one at a time; new run cancels the previous
concurrency:
  group: scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create data dir if missing
        run: mkdir -p data

      # Git LFS: jobs.db can exceed GitHub's 100 MB blob limit; LFS stores the binary separately.
      # Cleanup (watchlist db_cleanup + strip_job_descriptions) also keeps the file small.
      - name: Install Git LFS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y git-lfs
          git lfs install

      # Shallow clone of state-db so we get the real SQLite file (works for plain git and LFS).
      - name: Restore DB from state branch (if exists)
        env:
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          echo "::group::Restore DB from state-db branch"
          mkdir -p data
          if git ls-remote --heads origin state-db 2>/dev/null | grep -q .; then
            rm -rf .state-db-clone-tmp
            git clone --depth 1 --branch state-db "$REPO_URL" .state-db-clone-tmp
            cp .state-db-clone-tmp/data/jobs.db data/jobs.db
            rm -rf .state-db-clone-tmp
            echo "jobs.db restored; size: $(du -h data/jobs.db | cut -f1)"
          else
            echo "no previous jobs.db found (first run)"
          fi
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run scraper
        id: scrape
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      # DB pruning and VACUUM run inside python -m src.main (watchlist db_cleanup:).

      - name: Log state before cache save
        if: success()
        run: |
          echo "::group::Pre-persist diagnostics"
          echo "data/ contents:"
          ls -la data/ 2>/dev/null || true
          echo "data/ size: $(du -sh data/ 2>/dev/null | cut -f1 || echo 'N/A')"
          if [ -f data/jobs.db ]; then
            echo "jobs.db size: $(du -h data/jobs.db | cut -f1)"
            echo "jobs count: $(sqlite3 data/jobs.db 'SELECT COUNT(*) FROM jobs;' 2>/dev/null || echo '?')"
          fi
          echo "::endgroup::"

      - name: Persist DB to state branch
        if: success()
        run: |
          echo "::group::Persist jobs.db to state-db branch"
          if [ ! -f data/jobs.db ]; then
            echo "jobs.db missing; skipping persist"
            echo "::endgroup::"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin state-db || true
          git worktree remove state-worktree --force 2>/dev/null || true
          rm -rf state-worktree
          if git rev-parse --verify --quiet origin/state-db >/dev/null; then
            git worktree add state-worktree origin/state-db
          else
            git worktree add -b state-db state-worktree
          fi

          mkdir -p state-worktree/data
          cp data/jobs.db state-worktree/data/jobs.db
          cd state-worktree
          git lfs install
          if [ ! -f .gitattributes ] || ! grep -q 'data/jobs.db' .gitattributes 2>/dev/null; then
            git lfs track "data/jobs.db"
          fi
          git add -f .gitattributes data/jobs.db
          git commit -m "Update jobs DB" || echo "No DB changes to commit"
          git push origin HEAD:state-db
          echo "::endgroup::"
