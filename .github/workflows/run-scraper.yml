# Run the Gold Gem Jobs scraper every 15 minutes.
# Persists SQLite DB between runs via cache so only new jobs trigger Discord alerts.

name: Run scraper every 15 min

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Needed to push updated DB to a state branch
permissions:
  contents: write

# Prevent overlapping runs: only one at a time; new run cancels the previous
concurrency:
  group: scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create data dir if missing
        run: mkdir -p data

      # GitHub Actions cache keys are immutable (can't update the same key each run).
      # Instead, persist the SQLite DB to a dedicated branch so it can be updated every run.
      - name: Restore DB from state branch (if exists)
        run: |
          echo "::group::Restore DB from state-db branch"
          git fetch origin state-db || true
          if git rev-parse --verify --quiet origin/state-db >/dev/null; then
            git show origin/state-db:data/jobs.db > data/jobs.db || true
          fi
          if [ -f data/jobs.db ]; then
            echo "jobs.db restored; size: $(du -h data/jobs.db | cut -f1)"
          else
            echo "no previous jobs.db found (first run)"
          fi
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run scraper
        id: scrape
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      # Keep DB small: prune old jobs (90 days), then compact. Smaller DB = fewer random cache save failures.
      - name: Prune and compact DB before cache
        if: success()
        run: |
          if [ -f data/jobs.db ]; then
            sqlite3 data/jobs.db "DELETE FROM jobs WHERE last_seen_at < datetime('now', '-90 days');" 2>/dev/null || true
            sqlite3 data/jobs.db "VACUUM;" 2>/dev/null || true
          fi

      - name: Log state before cache save
        if: success()
        run: |
          echo "::group::Pre-persist diagnostics"
          echo "data/ contents:"
          ls -la data/ 2>/dev/null || true
          echo "data/ size: $(du -sh data/ 2>/dev/null | cut -f1 || echo 'N/A')"
          if [ -f data/jobs.db ]; then
            echo "jobs.db size: $(du -h data/jobs.db | cut -f1)"
            echo "jobs count: $(sqlite3 data/jobs.db 'SELECT COUNT(*) FROM jobs;' 2>/dev/null || echo '?')"
          fi
          echo "::endgroup::"

      - name: Persist DB to state branch
        if: success()
        run: |
          echo "::group::Persist jobs.db to state-db branch"
          if [ ! -f data/jobs.db ]; then
            echo "jobs.db missing; skipping persist"
            echo "::endgroup::"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin state-db || true
          if git rev-parse --verify --quiet origin/state-db >/dev/null; then
            git worktree add state-worktree origin/state-db
          else
            git worktree add -b state-db state-worktree
          fi

          mkdir -p state-worktree/data
          cp data/jobs.db state-worktree/data/jobs.db
          cd state-worktree
          git add -f data/jobs.db
          git commit -m "Update jobs DB" || echo "No DB changes to commit"
          git push origin HEAD:state-db
          echo "::endgroup::"
